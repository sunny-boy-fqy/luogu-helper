name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install PyInstaller and dependencies
        run: |
          pip install pyinstaller requests
      
      - name: Build Python executables
        run: |
          python build_executables.py
          # Verify executables were built
          ls -la dist/
          if [ ! -f "dist/fetch_problem" ] || [ ! -f "dist/bundle" ]; then
            echo "Error: Executables not built successfully!"
            exit 1
          fi
      
      - name: Make shell scripts executable
        run: |
          chmod +x new clear sync tools/judge tools/checker tools/bundle tools/get_problem tools/get_solve
      
      - name: Create Linux package
        run: |
          mkdir -p release/luogu-helper
          cp -r include release/luogu-helper/
          cp -r std release/luogu-helper/
          cp -r tools release/luogu-helper/
          cp -r .vscode release/luogu-helper/
          cp .gitignore release/luogu-helper/
          cp new clear sync release/luogu-helper/
          cp config_cookie release/luogu-helper/
          chmod +x release/luogu-helper/config_cookie
          cp new.bat clear.bat sync.bat release/luogu-helper/
          cp tools/*.bat release/luogu-helper/tools/
          # Copy built executables
          cp dist/fetch_problem release/luogu-helper/tools/
          cp dist/bundle release/luogu-helper/tools/
          chmod +x release/luogu-helper/tools/fetch_problem release/luogu-helper/tools/bundle
          cp README.md README_en.md README_zh.md README_windows.md release/luogu-helper/ 2>/dev/null || true
          cd release && tar -czvf luogu-helper-linux.tar.gz luogu-helper
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: release/luogu-helper-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install PyInstaller and dependencies
        run: |
          pip install pyinstaller requests
      
      - name: Build Python executables
        run: |
          python build_executables.py
      
      - name: Create Windows package
        shell: pwsh
        run: |
          # Create std_windows directory with actual files (not symlinks)
          New-Item -ItemType Directory -Force -Path std_windows
          Copy-Item -Force std/gen.cpp, std/main.cpp std_windows\
          Copy-Item -Force tools/*.bat std_windows\
          
          New-Item -ItemType Directory -Force -Path release\luogu-helper
          Copy-Item -Recurse -Force include release\luogu-helper\
          Copy-Item -Recurse -Force std_windows release\luogu-helper\std
          Copy-Item -Recurse -Force tools release\luogu-helper\
          Copy-Item -Recurse -Force .vscode release\luogu-helper\
          Copy-Item -Force new release\luogu-helper\
          Copy-Item -Force clear release\luogu-helper\
          Copy-Item -Force sync release\luogu-helper\
          Copy-Item -Force config_cookie.bat release\luogu-helper\
          Copy-Item -Force new.bat release\luogu-helper\
          Copy-Item -Force clear.bat release\luogu-helper\
          Copy-Item -Force sync.bat release\luogu-helper\
          Copy-Item -Force tools\*.bat release\luogu-helper\tools\
          # Copy built executables
          Copy-Item -Force dist\fetch_problem.exe release\luogu-helper\tools\
          Copy-Item -Force dist\bundle.exe release\luogu-helper\tools\
          Copy-Item -Force .gitignore release\luogu-helper\
          Copy-Item -Force README.md release\luogu-helper\ -ErrorAction SilentlyContinue
          Copy-Item -Force README_en.md release\luogu-helper\ -ErrorAction SilentlyContinue
          Copy-Item -Force README_zh.md release\luogu-helper\ -ErrorAction SilentlyContinue
          Copy-Item -Force README_windows.md release\luogu-helper\ -ErrorAction SilentlyContinue
          Compress-Archive -Path release\luogu-helper -DestinationPath release\luogu-helper-windows.zip
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: release/luogu-helper-windows.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-package
          path: artifacts
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: artifacts
      
      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Luogu Helper ${{ steps.version.outputs.VERSION }}
          body: |
            ## Luogu Helper ${{ steps.version.outputs.VERSION }}
            
            洛谷辅助工具 - 算法竞赛开发工具集
            
            ### 下载说明
            
            - **Linux**: `luogu-helper-linux.tar.gz`
            - **Windows**: `luogu-helper-windows.zip`
            - **macOS**: 使用 Linux 版本（bash脚本兼容）
            
            ### 快速开始
            
            #### Linux/macOS
            ```bash
            tar -xzf luogu-helper-linux.tar.gz
            cd luogu-helper
            chmod +x new clear sync tools/*
            ./new P1000  # 创建题目
            ```
            
            #### Windows
            ```cmd
            解压 luogu-helper-windows.zip
            cd luogu-helper
            new.bat P1000
            ```
            
            ### 功能
            
            - 创建题目目录（从洛谷抓取样例）
            - 本地评测（judge）
            - 对排测试（checker）
            - 代码打包（bundle - 展开头文件）
            - 获取题目描述/题解
            - Google Drive 同步
            
            ### 系统要求
            
            - **Linux**: g++ (C++17), Python 3.x
            - **macOS**: clang++ (C++17), Python 3.x  
            - **Windows**: MinGW-w64 或 MSVC, Python 3.x
            
            详细文档见 [README.md](README.md) 和 [README_windows.md](README_windows.md)
          files: |
            artifacts/luogu-helper-linux.tar.gz
            artifacts/luogu-helper-windows.zip
          draft: false
          prerelease: false